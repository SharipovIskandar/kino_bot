<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KinoBot Admin — Kirish</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1d23 0%, #2d3748 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border-radius: 1rem;
      border: 0;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .login-header {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 1rem 1rem 0 0;
      padding: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-film text-white" style="font-size: 3rem;"></i>
    <h4 class="text-white fw-bold mt-2 mb-0">KinoBot Admin</h4>
    <p class="text-white-50 small mb-0">Boshqaruv paneli</p>
  </div>
  <div class="card-body p-4">
    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="bi bi-x-circle me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="mb-3">
        <label class="form-label fw-medium">Telegram ID</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="number" class="form-control" name="telegram_id"
                 placeholder="123456789" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-medium">Parol</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" name="password"
                 placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-warning w-100 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Kirish
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
